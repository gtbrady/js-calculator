<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="calculator.js" defer></script>
</head>
<body>
    <div class="main-container">
        <div class="output">0</div>
        <div class="main-button-container">
            <div class="button-container-1">
                <button>7</button>
                <button>4</button>
                <button>1</button>
                <button>+/-</button>
            </div>
            <div class="button-container-2">
                <button>8</button>
                <button>5</button>
                <button>2</button>
                <button>0</button>
            </div>
            <div class="button-container-3">
                <button>9</button>
                <button>6</button>
                <button>3</button>
                <button>.</button>
            </div>
            <div class="button-container-4">
                <button>&divide</button>
                <button>x</button>
                <button>-</button>
                <button>+</button>
            </div>
            <div class="button-container-5"></div>
                <button>C</button>
                <button>&larr;</button>
                <button>=</button>
        </div>
    </div>
</body>
</html>
